<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- FAVICON SETTINGS -->
    <!-- Agar tere paas apna logo hai, toh usko favicon.ico bana ke public folder me daal de, ya same PNG use kar le -->
    <link rel="icon" type="image/png" href="/image_one.png" />
    <link rel="apple-touch-icon" href="/image_one.png" />
    
    <!-- MOBILE VIEWPORT & THEME -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F9F7F2" /> <!-- Tera background color -->

    <!-- SEO META TAGS (Tera dost jo SEO karega usko yahi chahiye) -->
    <title>NEXARA | Premium Digital Experiences</title>
    <meta name="description" content="NEXARA is a modern digital execution studio building premium web experiences, scalable apps, and growth systems for ambitious brands." />
    <meta name="keywords" content="NEXARA, web development, app development, digital studio, UI/UX design, SEO, digital marketing" />
    <meta name="author" content="NEXARA Studio" />
    <meta name="robots" content="index, follow" />
    
    <link rel="canonical" href="https://www.nexara.studio/" />

    <!-- OPEN GRAPH (Social Media par link share karne ke liye) -->
    <meta property="og:title" content="NEXARA | Premium Digital Experiences" />
    <meta property="og:description" content="Building the future of digital experiences with modern technology at the core." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.nexara.studio/" /> <!-- Apna actual domain dal dena baad me -->
    <meta property="og:image" content="/image_one.png" /> <!-- Link preview image -->
    <meta property="og:site_name" content="NEXARA" />

    <!-- TWITTER CARDS -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NEXARA | Premium Digital Experiences" />
    <meta name="twitter:description" content="NEXARA is a modern digital execution studio building premium web experiences, scalable apps, and growth systems." />
    <meta name="twitter:image" content="/image_one.png" />

    <!-- STRUCTURED DATA (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "NEXARA",
      "url": "https://www.nexara.studio/",
      "logo": "https://www.nexara.studio/image_one.png",
      "description": "NEXARA is a modern digital execution studio building premium web experiences, scalable apps, and growth systems for ambitious brands.",
      "sameAs": [
        "https://twitter.com/nexarastudio",
        "https://www.linkedin.com/company/nexarastudio"
      ]
    }
    </script>

    <!-- GOOGLE FONTS (Optional, but adds a premium feel if you want to use it later) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
